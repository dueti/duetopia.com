baseURL = "https://blog.duetopia.com/"
languageCode = "zh-cn"
title = "Duet"
theme = "PaperMod"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup.goldmark.renderer]
  unsafe = true

[params]
  env = "production"
  title = "Duet"
  description = "duet 的个人博客"
  author = "duet"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  defaultTheme = "auto"
  favicon = "/favicon.png"

  [params.label]
    text = "Duet"
    icon = "/avatar.png"
    iconHeight = 30

  [params.homeInfoParams]
    Title = ""
    Content = ""

  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/Duetopid"

  [[params.socialIcons]]
    name = "wechat"
    url = "javascript:void(0)"

[menu]
  [[menu.main]]
    name = "文章"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "标签"
    url = "/tags/"
    weight = 2
  [[menu.main]]
    name = "搜索"
    url = "/search/"
    weight = 3
  [[menu.main]]
    name = "归档"
    url = "/archives/"
    weight = 4
